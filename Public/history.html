<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Version History - DocInspector</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="index.css">
  <style>
    .history-hero {
      padding-top: 8rem;
      padding-bottom: 4rem;
      text-align: center;
    }
    
    .changelog-section {
      text-align: left;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .changelog-entry {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 4px solid var(--cyan);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s ease;
    }

    .changelog-entry:hover {
      transform: translateX(5px);
      background: rgba(255, 255, 255, 0.05);
    }

    .changelog-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 0.5rem;
    }

    .changelog-version {
      font-weight: bold;
      color: var(--cyan);
      font-size: 1.25rem;
    }

    .changelog-date {
      font-size: 0.9rem;
      opacity: 0.6;
    }

    .changelog-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .changelog-item {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.6rem;
      line-height: 1.5;
      opacity: 0.9;
    }

    .changelog-item::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--cyan);
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .changelog-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.3rem;
      }
      .changelog-entry {
        padding: 1.2rem;
      }
      .history-hero {
        padding-top: 6rem;
        padding-bottom: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <!-- HEADER (Copied from download.html) -->
    <header class="site-header">
      <div class="container">
        <div class="navbar">
          <a href="index.html" class="brand">
            <div class="brand-logo"><img src="assets/logo.png" alt="logo"></div>
            <div class="brand-text">
              <div class="brand-name" data-i18n="brand.name">DocInspector</div>
              <div class="brand-subtitle" data-i18n="brand.subtitle">Repair, Batch Manager of Documents & Audit Suite</div>
            </div>
          </a>
          <nav class="nav-links" id="navLinks">
            <a href="index.html" data-i18n="nav.home">Home</a>
            <a href="download.html" class="active" data-i18n="nav.download">Download</a>
            <a href="price.html" data-i18n="nav.price">Price</a>
            <a href="user-guide.html" data-i18n="nav.guide">User Guide</a>
            <a href="reports.html" data-i18n="nav.reports">Reports</a>
            <a href="contact.html" data-i18n="nav.contact">Contact</a>
          </nav>
          <div class="nav-actions">
            <div class="lang-dropdown desktop-only">
              <button class="lang-btn" id="langBtn"><span class="lang-pill">EN</span> <span class="chev">▾</span></button>
              <div class="lang-menu" id="langMenu">
                <button class="lang-item" data-lang="EN">EN</button>
                <button class="lang-item" data-lang="RO">RO</button>
                <button class="lang-item" data-lang="RU">RU</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="history-hero">
          <h1 class="section-title text-gradient" data-i18n="download.changelog.title">Version History</h1>
          <p class="section-subtitle">Full list of updates and improvements.</p>
        </div>

        <div class="changelog-section">
          <div id="changelogContainer">
            <!-- Full history rendered here -->
          </div>
          <div style="text-align: center; margin-top: 3rem;">
            <a href="download.html" class="btn btn-outline">&larr; Back to Download</a>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <div data-i18n="footer.copyright">© 2025 Vladimir Tonu</div>
      </div>
    </footer>
  </div>

  <script src="i18n-dict.js"></script>
  <script src="i18n.js"></script>
  <script>
    (() => {
      async function fetchFullHistory() {
        const container = document.getElementById('changelogContainer');
        try {
          const response = await fetch('api/version.json?t=' + Date.now());
          const data = await response.json();
          
          if (data && data.history) {
            const currentLang = (window.__i18n && window.__i18n.getLang) ? window.__i18n.getLang().toLowerCase() : 'en';
            container.innerHTML = data.history.map(entry => {
              const changeList = entry['changes_' + currentLang] || entry['changes_en'] || entry.changes || [];
              return `
                <div class="changelog-entry">
                  <div class="changelog-header">
                    <span class="changelog-version">v${entry.version}</span>
                    <span class="changelog-date">${entry.date}</span>
                  </div>
                  <ul class="changelog-list">${changeList.map(change => `<li class="changelog-item">${change}</li>`).join('')}</ul>
                </div>
              `;
            }).join('');
          }
        } catch (e) {
          console.error('Failed to load history:', e);
        }
      }

      fetchFullHistory();

      // Simple Language Switching for this page
      document.querySelectorAll('.lang-item').forEach(i => {
        i.onclick = () => {
          if (window.__i18n) {
            window.__i18n.setLang(i.dataset.lang);
            fetchFullHistory();
          }
        };
      });
      
      const btn = document.getElementById('langBtn');
      if (btn) btn.onclick = () => btn.closest('.lang-dropdown').classList.toggle('open');
    })();
  </script>
</body>
</html>
