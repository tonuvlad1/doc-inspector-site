<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Thank You - DocInspector</title>
  <link rel="stylesheet" href="style.css?v=5" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
</head>

<body>
  <div class="page">
    <header class="site-header">
      <div class="container">
        <div class="navbar">
          <a href="index.html" class="brand">
            <div class="brand-logo"><img src="assets/logo.png" alt="logo"></div>
            <div class="brand-text">
              <div class="brand-name" data-i18n="brand.name">DocInspector</div>
              <div class="brand-subtitle" data-i18n="brand.subtitle">Repair, Batch Manager of Documents &amp; Audit
                Suite</div>
            </div>
          </a>
          <nav class="nav-links" id="navLinks" aria-label="Primary">
            <a href="index.html" data-i18n="nav.home">Home</a>
            <a href="price.html" data-i18n="nav.price">Price</a>
            <a href="user-guide.html" data-i18n="nav.guide">User Guide</a>
            <a href="reports.html" data-i18n="nav.reports">Reports &amp; Feedback</a>
            <a href="contact.html" data-i18n="nav.contact">Contact</a>
          
                        <div class="lang-dropdown mobile-only">
                            <button class="lang-btn"><span class="lang-pill">EN</span> <span class="chev">▾</span></button>
                            <div class="lang-menu">
                                <button class="lang-item" data-lang="EN">EN</button>
                                <button class="lang-item" data-lang="RO">RO</button>
                                <button class="lang-item" data-lang="RU">RU</button>
                            </div>
                        </div>
                    </nav>
          <div class="nav-actions">
            <div class="lang-dropdown desktop-only">
              <button class="lang-btn" id="langBtn" type="button" aria-haspopup="true" aria-expanded="false">
                <span class="lang-pill">EN</span>
                <span class="chev">▾</span>
              </button>
              <div class="lang-menu" id="langMenu" role="menu">
                <button class="lang-item" data-lang="EN" role="menuitem">EN</button>
                <button class="lang-item" data-lang="RO" role="menuitem">RO</button>
                <button class="lang-item" data-lang="RU" role="menuitem">RU</button>
              </div>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Menu">
              <span></span><span></span><span></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="section" style="min-height: 60vh; display: flex; align-items: center;">
      <div class="container" style="text-align: center;">
        <header class="section-header">
          <h1 class="section-title text-gradient" data-i18n="thanks.title">Thank you</h1>
          <p class="section-subtitle" data-i18n="thanks.subtitle">Your message was submitted successfully. We’ll reply
            by email.</p>
        </header>
        <a class="btn btn-primary" href="index.html" data-i18n="thanks.btn">Back to Home</a>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div data-i18n="footer.copyright">© 2025 Vladimir Tonu – All rights reserved</div>
        <div class="footer-links" style="align-items: center;">
          <a href="index.html" data-i18n="nav.home">Home</a>
          <a href="privacy.html" data-i18n="footer.privacy">Privacy Policy</a>
          <a href="contact.html" data-i18n="footer.support">Support</a>
          <a href="https://doc-inspector.com/reports" class="btn btn-outline btn-sm" data-i18n="footer.bug"
            style="border-radius: 50px; padding: 0.4rem 1rem;">Report a bug</a>
        </div>
      </div>
    </footer>
  </div>
  <script src="i18n-dict.js"></script>
  <script src="i18n.js"></script>
  <script>
            (() => {
            const btns = document.querySelectorAll('.lang-btn');
            const navToggle = document.getElementById('navToggle'); 
            const navLinks = document.getElementById('navLinks');
            
            btns.forEach(btn => {
                btn.onclick = (e) => { 
                    e.stopPropagation(); 
                    const dd = btn.closest('.lang-dropdown');
                    dd.classList.toggle('open'); 
                };
            });
            
            document.querySelectorAll('.lang-item').forEach(i => {
                i.onclick = () => {
                    if (window.__i18n) window.__i18n.setLang(i.dataset.lang); 
                    document.querySelectorAll('.lang-dropdown.open').forEach(dd => dd.classList.remove('open'));
                };
            });
            
            if (navToggle) navToggle.onclick = () => { 
                navLinks.classList.toggle('active'); 
                navToggle.classList.toggle('open'); 
            };
            
            document.onclick = () => document.querySelectorAll('.lang-dropdown.open').forEach(dd => dd.classList.remove('open'));
        })();
  </script>
</body>

</html>
